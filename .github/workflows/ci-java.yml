name: Java CI

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'ml-service-java/**'
      - 'pom.xml'
  push:
    branches: [main, develop]
    paths:
      - 'ml-service-java/**'
      - 'pom.xml'
  workflow_dispatch:

jobs:
  # Java Linting and Testing
  lint-java:
    name: Lint Java
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Checkstyle
        working-directory: ml-service-java
        run: mvn checkstyle:check

  # Java Tests
  test-java:
    name: Test Java
    runs-on: ubuntu-latest
    needs: lint-java
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        working-directory: ml-service-java
        run: mvn test

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./ml-service-java/target/site/jacoco/jacoco.xml
          flags: java-service
          name: java-coverage
        continue-on-error: true
