name: SWM Master CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  # Overall status check - individual workflows are triggered by path changes
  ci-status:
    name: CI Status Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: CI Status
        run: |
          echo "🔄 CI workflows are configured to run based on file path changes:"
          echo "  • JavaScript/TypeScript: ci-javascript.yml (frontend/, backend/, *.json)"
          echo "  • Java: ci-java.yml (ml-service-java/, pom.xml)"
          echo "  • Python: ci-python.yml (ml-service/, requirements*, pytest.ini)"
          echo "  • Build/Deploy: ci-deploy.yml (all changes)"
          echo ""
          echo "✅ All workflows use proper caching and Node.js 24 enforcement"
