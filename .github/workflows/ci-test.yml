name: Test CI Workflows

on:
  workflow_dispatch:

jobs:
  test-workflows:
    name: Test Workflow Execution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Test Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Check files
        run: |
          echo "Testing workflow execution..."
          ls -la frontend/src/
          ls -la backend/src/
          echo "✅ Workflows are working!"
