version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: swm-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-swm_db}
      POSTGRES_USER: ${DB_USER:-swm_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-swm_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-swm_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - swm-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: swm-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - swm-network

  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: swm-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-swm_db}
      DB_USER: ${DB_USER:-swm_user}
      DB_PASSWORD: ${DB_PASSWORD:-swm_password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password}
      ML_SERVICE_URL: http://ml-service:5000
    ports:
      - "3000:3000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/logs:/app/logs
    restart: unless-stopped
    networks:
      - swm-network

  # ML Service
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: swm-ml-service
    environment:
      FLASK_ENV: ${FLASK_ENV:-development}
      ML_SERVICE_HOST: 0.0.0.0
      ML_SERVICE_PORT: 5000
    ports:
      - "5000:5000"
    volumes:
      - ./ml-service/src:/app/src
      - ./ml-service/models:/app/models
      - ./ml-service/logs:/app/logs
    restart: unless-stopped
    networks:
      - swm-network

  # Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: swm-frontend
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://localhost:3000/api/v1
      REACT_APP_ML_SERVICE_URL: http://localhost:5000
    ports:
      - "3001:3001"
    restart: unless-stopped
    networks:
      - swm-network

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: swm-nginx
    depends_on:
      - backend
      - frontend
      - ml-service
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    networks:
      - swm-network

volumes:
  postgres_data:
  redis_data:

networks:
  swm-network:
    driver: bridge
