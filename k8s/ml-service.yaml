apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-service
  namespace: swm
  labels:
    app: ml-service
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ml-service
  template:
    metadata:
      labels:
        app: ml-service
    spec:
      containers:
      - name: ml-service
        image: ghcr.io/yourusername/swm/ml-service:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 5000
        env:
        - name: FLASK_ENV
          value: "production"
        - name: ML_SERVICE_HOST
          value: "0.0.0.0"
        - name: ML_SERVICE_PORT
          value: "5000"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        securityContext:
          runAsNonRoot: true
          readOnlyRootFilesystem: false
          allowPrivilegeEscalation: false

---
apiVersion: v1
kind: Service
metadata:
  name: ml-service
  namespace: swm
spec:
  type: ClusterIP
  selector:
    app: ml-service
  ports:
  - port: 5000
    targetPort: 5000
    protocol: TCP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ml-service-hpa
  namespace: swm
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ml-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
