<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="binGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Recycling Bin Body -->
  <rect x="50" y="80" width="100" height="80" rx="8" ry="8" fill="url(#binGradient)" stroke="#1B5E20" stroke-width="3"/>

  <!-- Bin Lid -->
  <rect x="45" y="70" width="110" height="15" rx="8" ry="8" fill="url(#binGradient)" stroke="#1B5E20" stroke-width="3"/>

  <!-- Bin Handle -->
  <ellipse cx="100" cy="77" rx="15" ry="8" fill="none" stroke="#1B5E20" stroke-width="3"/>

  <!-- Recycling Arrows -->
  <g transform="translate(100, 120)">
    <!-- Outer Arrow -->
    <path d="M-25,-25 L-15,-35 L-5,-25 L5,-25 L15,-35 L25,-25 L25,-15 L15,-5 L5,-15 L-5,-15 L-15,-5 L-25,-15 Z"
          fill="none" stroke="#81C784" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Inner Arrow -->
    <path d="M-15,-15 L-10,-20 L-5,-15 L0,-15 L5,-20 L10,-15 L10,-10 L5,-5 L0,-10 L-5,-10 L-10,-5 L-15,-10 Z"
          fill="#81C784"/>
  </g>

  <!-- Bin Lines/Details -->
  <line x1="70" y1="100" x2="130" y2="100" stroke="#1B5E20" stroke-width="2"/>
  <line x1="70" y1="120" x2="130" y2="120" stroke="#1B5E20" stroke-width="2"/>
  <line x1="70" y1="140" x2="130" y2="140" stroke="#1B5E20" stroke-width="2"/>
</svg>
