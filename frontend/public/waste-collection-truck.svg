<svg width="300" height="200" viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="truckGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="binGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Road/Base -->
  <rect x="0" y="160" width="300" height="40" fill="#374151"/>
  <rect x="0" y="170" width="300" height="2" fill="#F59E0B" opacity="0.6"/>
  <rect x="0" y="175" width="300" height="2" fill="#F59E0B" opacity="0.6"/>

  <!-- Waste Bin -->
  <rect x="30" y="120" width="25" height="35" rx="3" ry="3" fill="url(#binGradient)" stroke="#1B5E20" stroke-width="2"/>
  <rect x="25" y="115" width="35" height="8" rx="3" ry="3" fill="url(#binGradient)" stroke="#1B5E20" stroke-width="2"/>
  <ellipse cx="42.5" cy="118" rx="6" ry="3" fill="none" stroke="#1B5E20" stroke-width="2"/>
  <!-- QR Code on bin -->
  <rect x="35" y="125" width="15" height="15" fill="white" stroke="#1B5E20" stroke-width="1"/>
  <rect x="37" y="127" width="3" height="3" fill="#1B5E20"/>
  <rect x="43" y="127" width="3" height="3" fill="#1B5E20"/>
  <rect x="37" y="133" width="3" height="3" fill="#1B5E20"/>
  <rect x="43" y="133" width="3" height="3" fill="#1B5E20"/>

  <!-- Collection Truck -->
  <!-- Truck Body -->
  <rect x="120" y="100" width="120" height="50" rx="5" ry="5" fill="url(#truckGradient)" stroke="#047857" stroke-width="3"/>
  <!-- Truck Cabin -->
  <rect x="80" y="110" width="50" height="40" rx="5" ry="5" fill="url(#truckGradient)" stroke="#047857" stroke-width="3"/>
  <!-- Windshield -->
  <polygon points="85,115 125,115 120,135 90,135" fill="#E5E7EB" opacity="0.8"/>
  <!-- Wheels -->
  <circle cx="110" cy="155" r="12" fill="#1F2937" stroke="#374151" stroke-width="2"/>
  <circle cx="110" cy="155" r="6" fill="#6B7280"/>
  <circle cx="190" cy="155" r="12" fill="#1F2937" stroke="#374151" stroke-width="2"/>
  <circle cx="190" cy="155" r="6" fill="#6B7280"/>
  <!-- QR Scanner on truck -->
  <rect x="235" y="105" width="20" height="15" rx="2" ry="2" fill="#1F2937" stroke="#374151" stroke-width="2"/>
  <rect x="240" y="110" width="10" height="8" fill="#10B981"/>
  <!-- Antenna -->
  <line x1="245" y1="105" x2="245" y2="95" stroke="#1F2937" stroke-width="2"/>
  <circle cx="245" cy="93" r="2" fill="#EF4444"/>
  <!-- Truck Details -->
  <rect x="125" y="125" width="8" height="20" fill="#E5E7EB"/>
  <rect x="140" y="125" width="8" height="20" fill="#E5E7EB"/>
  <rect x="155" y="125" width="8" height="20" fill="#E5E7EB"/>
  <!-- SWM Text -->
  <text x="150" y="95" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">SWM</text>

  <!-- Collection Arrow/Animation -->
  <path d="M 70 140 Q 95 130 120 140" stroke="#10B981" stroke-width="3" fill="none" stroke-linecap="round" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981"/>
    </marker>
  </defs>

  <!-- Digital Elements -->
  <!-- GPS Signal -->
  <circle cx="250" cy="80" r="3" fill="#10B981" opacity="0.8"/>
  <circle cx="250" cy="75" r="2" fill="#10B981" opacity="0.6"/>
  <circle cx="250" cy="70" r="1" fill="#10B981" opacity="0.4"/>
  <!-- Data Flow -->
  <path d="M 255 85 L 265 85 L 270 80 L 275 85 L 285 85" stroke="#10B981" stroke-width="2" fill="none" opacity="0.7"/>
</svg>
